<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">国富町 返礼品メインビジュアル</title>
  <desc id="desc">国富町の自然と返礼品をイメージした800x800のメインビジュアル画像</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5ef"/>
      <stop offset="100%" stop-color="#ffe3cf"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90b572"/>
      <stop offset="100%" stop-color="#6f9756"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd267"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <circle cx="640" cy="150" r="72" fill="url(#sun)" opacity="0.95"/>
  <circle cx="640" cy="150" r="102" fill="#ffcf73" opacity="0.2"/>

  <path d="M0 470 C120 420 210 455 320 420 C430 385 550 430 800 360 L800 800 L0 800 Z" fill="url(#hill)"/>
  <path d="M0 540 C150 500 260 560 390 520 C520 480 620 520 800 500 L800 800 L0 800 Z" fill="#7ca462"/>

  <g transform="translate(120 250)">
    <rect x="0" y="0" width="560" height="250" rx="24" fill="#ffffff" opacity="0.86"/>
    <text x="40" y="90" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="58" font-weight="700" fill="#8b2e2e">国富町 返礼品特集</text>
    <text x="42" y="145" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="28" fill="#5b5b5b">自然の恵みを、あなたの食卓へ。</text>
    <rect x="42" y="176" width="208" height="44" rx="22" fill="#bf0000"/>
    <text x="70" y="205" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="22" font-weight="700" fill="#ffffff">おすすめを見る</text>
  </g>

  <g transform="translate(90 610)">
    <rect x="0" y="0" width="170" height="120" rx="14" fill="#fff" opacity="0.95"/>
    <rect x="188" y="0" width="170" height="120" rx="14" fill="#fff" opacity="0.95"/>
    <rect x="376" y="0" width="170" height="120" rx="14" fill="#fff" opacity="0.95"/>

    <text x="30" y="46" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="18" font-weight="700" fill="#7a2a2a">宮崎牛</text>
    <text x="30" y="76" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="15" fill="#5a5a5a">人気の返礼品</text>

    <text x="218" y="46" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="18" font-weight="700" fill="#7a2a2a">ひのひかり</text>
    <text x="218" y="76" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="15" fill="#5a5a5a">産地直送</text>

    <text x="406" y="46" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="18" font-weight="700" fill="#7a2a2a">完熟マンゴー</text>
    <text x="406" y="76" font-family="'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif" font-size="15" fill="#5a5a5a">季節限定</text>
  </g>
</svg>
