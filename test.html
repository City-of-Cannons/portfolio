<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テストページ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .box {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }

    p {
      margin: 0 0 20px;
      font-size: 16px;
    }

    button {
      border: none;
      background: #222;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.9;
    }

    #msg {
      margin-top: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>GitHub Pages テスト</h1>
    <p>表示できてたら成功。</p>
    <button id="testBtn">押す</button>
    <div id="msg"></div>
  </div>

  <script>
    document.getElementById("testBtn").addEventListener("click", function () {
      document.getElementById("msg").textContent = "ボタン動いた。JSもOK。";
    });
  </script>
</body>
</html>
